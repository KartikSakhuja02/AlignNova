<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Alignova | Executive Career Network Login</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <script src="tailwind.config.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

  <!-- Atmospheric Background Decoration -->
  <div class="absolute inset-0 z-0">
    <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-primary/5 blur-[120px]"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-secondary-container/20 blur-[120px]"></div>
  </div>

  <!-- Main Content Shell -->
  <main class="relative z-10 w-full max-w-[480px]">

    <!-- Brand Identity -->
    <div class="text-center mb-p-lg">
      <div class="inline-flex items-center justify-center space-x-2 mb-2">
        <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
          <span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">insights</span>
        </div>
        <h1 class="font-display-lg text-display-lg text-primary tracking-tight">Alignova</h1>
      </div>
      <p class="font-body-md text-on-surface-variant">The future of executive career placement</p>
    </div>

    <!-- Login Card -->
    <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-2xl p-p-lg md:p-p-xl subtle-shadow transition-all duration-300">
      <div class="mb-p-md">
        <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Welcome Back</h2>
        <p class="font-body-md text-on-surface-variant">Access your professional network and opportunities.</p>
      </div>

      <form class="space-y-gutter" id="login-form">
        <!-- Email Field -->
        <div class="floating-label-group">
          <input class="w-full h-14 px-4 pt-2 border border-outline-variant rounded-xl bg-transparent focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all font-body-md text-on-surface"
            id="email" placeholder=" " required type="email">
          <label class="font-label-md text-on-surface-variant" for="email">Email Address</label>
        </div>

        <!-- Password Field -->
        <div class="floating-label-group">
          <input class="w-full h-14 px-4 pt-2 border border-outline-variant rounded-xl bg-transparent focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all font-body-md text-on-surface"
            id="password" placeholder=" " required type="password">
          <label class="font-label-md text-on-surface-variant" for="password">Password</label>
        </div>

        <!-- Actions Row -->
        <div class="flex items-center justify-between">
          <label class="flex items-center space-x-2 cursor-pointer group">
            <input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20" type="checkbox">
            <span class="font-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
          </label>
          <a class="font-label-md text-primary hover:underline decoration-2 underline-offset-4 transition-all" href="#">Forgot password?</a>
        </div>

        <!-- Submit Button -->
        <button class="w-full h-14 bg-primary text-on-primary font-label-md rounded-xl hover-elevated active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
          <span>Sign In</span>
          <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
        </button>
      </form>

      <!-- Divider -->
      <div class="relative my-p-md">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-outline-variant/30"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="bg-surface-container-lowest px-4 font-caption text-outline">OR CONTINUE WITH</span>
        </div>
      </div>

      <!-- Social Login -->
      <div class="grid grid-cols-2 gap-4">
        <button class="h-12 border border-outline-variant rounded-xl font-label-md text-on-surface flex items-center justify-center space-x-2 hover:bg-surface-container-low transition-colors duration-200">
          <img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVq-ED0OZ1HsKAZdV3zD7mtETPQRGn0A-cTqF0_HBbkQwRsZ4BcWXt7yZpg0MO_VDCczZmL3F_u6akShwWPNmDgGd5SR9jw7x3Gao83L6eNITyAIqYbSeyqehKWEHa73jB9Vcx-4ETJMjrbyCW25zjzizLzL8RqclMRqdlUMRJsLet7ZKoFPgm-HqIg-tmrqo3pZx0FSulIUQTrAb5vzlbK6jhr1_lmeAsHja0iAsUEO9CmD4iBYXCP5mz_1OmtnbUNkLQuEVUyPA">
          <span>Google</span>
        </button>
        <button class="h-12 border border-outline-variant rounded-xl font-label-md text-on-surface flex items-center justify-center space-x-2 hover:bg-surface-container-low transition-colors duration-200">
          <span class="material-symbols-outlined text-[20px] text-[#0077b5]" style="font-variation-settings: 'FILL' 1;">work</span>
          <span>LinkedIn</span>
        </button>
      </div>
    </div>

    <!-- Footer Links -->
    <div class="mt-p-lg text-center">
      <p class="font-body-md text-on-surface-variant">
        Don't have an account?
        <a class="font-label-md text-primary font-bold hover:underline decoration-2 underline-offset-4 transition-all" href="#">Sign up</a>
      </p>
    </div>

    <!-- Abstract Tech Visual Element -->
    <div class="mt-p-xl flex justify-center opacity-40">
      <div class="flex space-x-4">
        <div class="w-1 h-8 bg-outline-variant rounded-full animate-[pulse_3s_infinite]"></div>
        <div class="w-1 h-12 bg-primary rounded-full animate-[pulse_4s_infinite]"></div>
        <div class="w-1 h-6 bg-secondary rounded-full animate-[pulse_2s_infinite]"></div>
        <div class="w-1 h-10 bg-outline-variant rounded-full animate-[pulse_5s_infinite]"></div>
        <div class="w-1 h-8 bg-primary/50 rounded-full animate-[pulse_3.5s_infinite]"></div>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <div class="fixed bottom-8 left-8 hidden lg:block">
    <p class="font-caption text-outline select-none">© 2026 AlignNova Executive Placement. Confidential Platform.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
